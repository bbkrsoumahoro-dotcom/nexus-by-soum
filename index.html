articles.unshift({name:name,price:price,cat:cat,img:dataUrl});
localStorage.setItem('nexus_articles',JSON.stringify(articles));
try{await fetch('http://localhost:8080',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file_name:file.name,file_data:dataUrl})});}catch(x){}
sndOpen();alert("✅ Publié !");renderArticles();closeWin('admin');
};reader.readAsDataURL(file);
}

/* ===== PARTICLES ===== */
(function(){
var canvas=document.getElementById('bg-canvas');
var ctx=canvas.getContext('2d');
var w,h,particles=[];
function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
function Pt(){this.x=Math.random()*w;this.y=Math.random()*h;this.vx=(Math.random()-0.5)*0.4;this.vy=(Math.random()-0.5)*0.4;this.size=Math.random()*1.5+0.5;}
Pt.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>w)this.vx*=-1;if(this.y<0||this.y>h)this.vy*=-1;};
Pt.prototype.draw=function(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle='rgba(0,255,200,0.35)';ctx.fill();};
for(var i=0;i<90;i++)particles.push(new Pt());
function animate(){
ctx.clearRect(0,0,w,h);
for(var i=0;i<particles.length;i++){
particles[i].update();particles[i].draw();
for(var j=i+1;j<particles.length;j++){
var dx=particles[i].x-particles[j].x;
var dy=particles[i].y-particles[j].y;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist<140){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle='rgba(0,255,200,'+(0.12*(1-dist/140))+')';ctx.lineWidth=0.6;ctx.stroke();}
}}
requestAnimationFrame(animate);
}
animate();
})();

/* ===== INIT ===== */
window.onload=function(){renderArticles();runBoot();};
</script>

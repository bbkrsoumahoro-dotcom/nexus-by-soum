<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS by Soum — OSINT & Cybersécurité</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: sans-serif; background: #0a0a0f; color: #e0e0e0; line-height: 1.6; overflow-x: hidden; }
        #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        nav { position: fixed; top: 0; width: 100%; background: rgba(10, 10, 15, 0.9); padding: 15px 40px; display: flex; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #00ffc8; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #00ffc8; }
        .logo span { color: #ffd700; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; z-index: 1; }
        h1 { font-size: 4rem; color: #00ffc8; text-shadow: 0 0 20px #00ffc8; margin-bottom: 10px; }
        .hero p { font-size: 1.5rem; color: #aaa; }
        section { padding: 80px 20px; max-width: 1000px; margin: auto; position: relative; z-index: 1; }
        h2 { color: #00ffc8; border-bottom: 2px solid #00ffc8; display: inline-block; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .card h3 { color: #ffd700; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="stars"></div>
    <nav>
        <div class="logo">NEXUS <span>by Soum</span></div>
    </nav>
    <div class="hero">
        <h1>NEXUS</h1>
        <p>Intelligence Center — Côte d'Ivoire</p>
    </div>
    <section>
        <h2>Nos Services</h2>
        <div class="grid">
            <div class="card"><h3>OSINT</h3><p>Surveillance 24/7 des réseaux sociaux et medias.</p></div>
            <div class="card"><h3>CYBER</h3><p>Sécurité offensive et protection des données.</p></div>
            <div class="card"><h3>FREELANCE</h3><p>Scraping Python et Montage Vidéo.</p></div>
        </div>
    </section>
</body>
</html>

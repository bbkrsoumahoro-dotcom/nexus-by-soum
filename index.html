<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
    <meta charset="UTF-8">
    <title>NEXUS EMPIRE | Intelligence & Cyber-Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --main: #00ffc8; --bg: #010103; --card: #0d1117; --gold: #ffd700; --admin: #ff0055; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; overflow-x: hidden; }
        
        /* HEADER STYLE AMAZON */
        header { background: #000; padding: 10px 4%; border-bottom: 2px solid var(--main); position: sticky; top: 0; z-index: 1000; }
        .nav-top { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; color: var(--main); cursor: pointer; }
        .search-box { flex-grow: 1; display: flex; max-width: 800px; }
        .search-box input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px 0 0 5px; }
        .search-box button { padding: 12px 25px; background: var(--main); border: none; border-radius: 0 5px 5px 0; cursor: pointer; color: #000; font-weight: bold; }

        /* BUREAU DES ICONS */
        #desktop { padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 30px; background: radial-gradient(circle at center, #0a1b2d 0%, #010103 100%); min-height: 90vh; }
        .app { text-align: center; cursor: pointer; padding: 15px; border-radius: 15px; transition: 0.3s; }
        .app:hover { background: rgba(0,255,200,0.1); transform: translateY(-5px); }
        .app i { font-size: 3rem; display: block; margin-bottom: 10px; }
        .app span { font-size: 0.7rem; font-weight: bold; color: #aaa; text-transform: uppercase; }

        /* FENÊTRES PRO */
        .window { display: none; position: fixed; top: 70px; left: 3%; width: 94%; height: 86vh; background: #080a12; border: 1px solid #444; border-radius: 12px; z-index: 2000; flex-direction: column; overflow: hidden; box-shadow: 0 0 100px #000; }
        .win-head { background: #111; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .win-body { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .close-btn { color: var(--admin); cursor: pointer; font-size: 1.5rem; }

        /* GRID ARTICLES */
        .grid-empire { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card-nexus { background: var(--card); border: 1px solid #333; border-radius: 10px; overflow: hidden; transition: 0.3s; position: relative; }
        .card-nexus img { width: 100%; height: 240px; object-fit: cover; }
        .card-info { padding: 20px; }
        .card-del { position: absolute; top: 10px; right: 10px; background: var(--admin); color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; display: none; }
        .card-price { color: var(--gold); font-weight: bold; font-size: 1.4rem; margin: 10px 0; }
        .btn-buy { display: block; width: 100%; padding: 12px; background: var(--main); color: #000; text-align: center; font-weight: bold; text-decoration: none; border-radius: 5px; }

        /* ADMIN & UPLOAD */
        .admin-cockpit { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .form-admin input, .form-admin select { width: 100%; padding: 15px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        
        /* IA SIDEBAR */
        #ia-win { position: fixed; right: -460px; top: 70px; width: 450px; height: 86vh; background: var(--card); border-left: 2px solid var(--main); transition: 0.5s; z-index: 3000; display: flex; flex-direction: column; }
        #ia-win.active { right: 0; }
    </style>
</head>
<body>

    <header>
        <div class="nav-top">
            <div class="logo" onclick="openWin('admin')">NEXUS<span>EMPIRE</span></div>
            <div class="search-box">
                <input type="text" placeholder="Rechercher Film, App, OSINT, Torrent..." id="master-search">
                <button onclick="alert('Exploration Nexus lancée...')">RECHERCHER</button>
            </div>
            <div style="color:var(--gold); font-weight:bold;"><i class="fas fa-user-shield"></i> ROOT: SOUM</div>
        </div>
    </header>

    <div id="desktop">
        <div class="app" onclick="openWin('market')" style="color:var(--main)"><i class="fas fa-shopping-cart"></i><span>Boutique</span></div>
        <div class="app" onclick="openWin('hub')" style="color:var(--gold)"><i class="fas fa-rss"></i><span>Veille Info</span></div>
        <div class="app" onclick="openWin('apps')" style="color:var(--blue)"><i class="fas fa-th"></i><span>Applications</span></div>
        <div class="app" onclick="openWin('play')" style="color:var(--blue)"><i class="fas fa-play-circle"></i><span>Streaming</span></div>
        <div class="app" onclick="openWin('gsm')" style="color:var(--admin)"><i class="fas fa-unlock"></i><span>Déblocage</span></div>
        <div class="app" onclick="window.open('https://t.me/ivory_intelligence_center')"><i class="fas fa-vault"></i><span>Warehouse</span></div>
        <div class="app" onclick="toggleIA()" style="color:var(--main)"><i class="fas fa-brain"></i><span>IA Nexus</span></div>
        <div class="app" onclick="openWin('admin')" style="color:var(--admin)"><i class="fas fa-user-cog"></i><span>Admin / Up</span></div>
    </div>

    <!-- IA SIDEBAR -->
    <div id="ia-win">
        <div class="win-head"><span>THE MYSTERIOUS NEXUS v11</span><i class="fas fa-times close-btn" onclick="toggleIA()"></i></div>
        <div id="ia-msgs" style="flex-grow:1; padding:20px; overflow-y:auto; font-size:0.9rem;"></div>
        <input type="text" id="ia-in" style="padding:20px; background:#000; border:none; border-top:1px solid #333; color:var(--main);" placeholder="Commande empire..." onkeydown="if(event.key==='Enter') callIA()">
    </div>

    <!-- WINDOWS RENDERS -->
    <div id="win-market" class="window">
        <div class="win-head"><span>🛒 MARKETPLACE SUPRÊME</span><i class="fas fa-times close-btn" onclick="closeWin('market')"></i></div>
        <div class="win-body"><div class="grid-empire" id="market-list"></div></div>
    </div>

    <div id="win-admin" class="window">
        <div class="win-head"><span>⚙️ ADMIN STATION</span><i class="fas fa-times close-btn" onclick="closeWin('admin')"></i></div>
        <div class="win-body">
            <div class="admin-cockpit">
                <div class="form-admin">
                    <h3>🚀 DIFFUSER UN ARTICLE</h3>
                    <input type="text" id="up-name" placeholder="Nom...">
                    <input type="text" id="up-price" placeholder="Prix (ex: 5000)">
                    <select id="up-cat"><option value="market">Marketplace</option><option value="apps">Applications</option><option value="play">Streaming</option></select>
                    <input type="file" id="up-file">
                    <button class="btn-buy" onclick="processPost()">PUBLIER MAINTENANT</button>
                </div>
                <div style="background:#000; padding:20px; border-radius:10px; border:1px solid var(--main);">
                    <h3>DASHBOARD CONTRÔLE</h3>
                    <p style="color:#0f0">> SYSTÈME : OPTIMAL</p>
                    <p style="color:#0f0">> BRIDGE IA : CONNECTÉ</p>
                    <button class="btn-buy" style="background:var(--admin); color:#fff; margin-top:30px;" onclick="enableDelete()">ACTIVER SUPPRESSION ARTICLES</button>
                    <button class="btn-buy" style="background:#333; color:#fff; margin-top:10px;" onclick="closeWin('admin')">RETOURNER AU BUREAU</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openWin(id) { 
            if(id === 'admin') { if(prompt("Pass :") !== 'soum225') return; }
            document.getElementById('win-' + id).style.display = 'flex'; 
        }
        function closeWin(id) { document.getElementById('win-' + id).style.display = 'none'; }
        function toggleIA() { document.getElementById('ia-win').classList.toggle('active'); }
        function enableDelete() { document.querySelectorAll('.card-del').forEach(d => d.style.display = 'block'); alert("Mode suppression activé."); }

        async function processPost() {
            const name = document.getElementById('up-name').value;
            const price = document.getElementById('up-price').value;
            const file = document.getElementById('up-file').files[0];
            if(!name || !file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const card = document.createElement('div');
                card.className = "card-nexus";
                card.innerHTML = `<button class="card-del" onclick="this.parentElement.remove()">X</button><img src="${e.target.result}"><div class="card-info"><h4>${name}</h4><div class="card-price">${price} FCFA</div><a href="https://t.me/CrogendSoumahoro_Bot" class="btn-buy">ACHETER</a></div>`;
                document.getElementById('market-list').prepend(card);
                alert("Publié avec succès !"); closeWin('admin');
            };
            reader.readAsDataURL(file);
        }

        async function callIA() {
            const i = document.getElementById('ia-in'); const m = document.getElementById('ia-msgs');
            m.innerHTML += `<p>> ${i.value}</p>`;
            try {
                const r = await fetch('http://localhost:8080', { method: 'POST', body: JSON.stringify({ prompt: i.value }) });
                const d = await r.json(); m.innerHTML += `<p style="color:var(--main)">🔱 <b>[NEXUS]:</b> ${d.response}</p>`;
            } catch { m.innerHTML += `<p style="color:red">[!] Bridge local HS.</p>`; }
            i.value = ""; m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>

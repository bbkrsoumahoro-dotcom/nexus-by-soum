<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
    <meta charset="UTF-8">
    <title>NEXUS SUPREME v9.1 | Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #00ffc8; --bg: #010102; --card: #0d1117; --gold: #ffd700; --admin: #ff0055; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin:0; overflow:hidden; }
        #taskbar { position:fixed; top:0; width:100%; height:50px; background:#000; border-bottom:2px solid var(--main); display:flex; align-items:center; justify-content:space-between; padding:0 20px; z-index:5000; }
        #desktop { width:100%; height:100vh; padding:80px 40px; display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:20px; background:radial-gradient(circle at center, #0a1b2d 0%, #010102 100%); }
        .icon { text-align:center; cursor:pointer; padding:10px; border-radius:10px; transition:0.3s; color: #888; }
        .icon:hover { background:rgba(0,255,200,0.1); color:#fff; transform:scale(1.05); }
        .icon i { font-size:2.5rem; display:block; margin-bottom:10px; }
        .icon span { font-size:0.6rem; font-weight:bold; text-transform:uppercase; }
        .window { display:none; position:fixed; top:70px; left:2%; width:96%; height:88vh; background:#080a10; border:2px solid #333; z-index:2000; flex-direction:column; }
        .win-head { background:#111; padding:15px; display:flex; justify-content:space-between; border-bottom:1px solid #444; }
        .win-body { flex-grow:1; padding:20px; overflow-y:auto; }
        .close-btn { color:var(--admin); cursor:pointer; font-size:1.5rem; }
    </style>
</head>
<body>
    <div id="taskbar">
        <div style="color:var(--main); font-weight:900; cursor:pointer;" onclick="openWin('admin')">NEXUS SUPREME</div>
        <div style="color:var(--gold); font-size: 0.8rem;">ROOT@SOUM: ~#</div>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWin('hub')" style="color:var(--main)"><i class="fas fa-satellite-dish"></i><span>Veille<br>Réseau</span></div>
        <div class="icon" onclick="window.open('https://t.me/ivory_intelligence_center')" style="color:var(--gold)"><i class="fas fa-vault"></i><span>Ivory<br>Warehouse</span></div>
        <div class="icon" onclick="window.open('https://t.me/veille_ci_bilan')" style="color:#fff"><i class="fas fa-file-word"></i><span>Archives<br>Word</span></div>
        <div class="icon" onclick="openWin('market')" style="color:var(--main)"><i class="fas fa-shopping-cart"></i><span>Shop<br>Boutique</span></div>
        <div class="icon" onclick="openWin('admin')" style="color:var(--admin)"><i class="fas fa-cog"></i><span>Admin<br>Upload</span></div>
    </div>

    <div id="win-hub" class="window">
        <div class="win-head"><span>RÉSEAU DE RENSEIGNEMENT</span><i class="fas fa-times close-btn" onclick="closeWin('hub')"></i></div>
        <div class="win-body">
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px;">
                <a href="https://t.me/veille_ci_national" target="_blank" style="background:#111; padding:30px; text-decoration:none; color:var(--main); border:1px solid #333; text-align:center;"><h2>NATIONAL CI</h2></a>
                <a href="https://t.me/veille_ci_continental" target="_blank" style="background:#111; padding:30px; text-decoration:none; color:var(--gold); border:1px solid #333; text-align:center;"><h2>AFRIQUE</h2></a>
                <a href="https://t.me/veille_ci_international" target="_blank" style="background:#111; padding:30px; text-decoration:none; color:var(--blue); border:1px solid #333; text-align:center;"><h2>MONDE</h2></a>
            </div>
        </div>
    </div>

    <div id="win-admin" class="window">
        <div class="win-head"><span>COMMAND CENTER & UPLOAD</span><i class="fas fa-times close-btn" onclick="closeWin('admin')"></i></div>
        <div class="win-body">
            <div style="background:#111; padding:30px; border-radius:10px; border:1px dashed var(--main); text-align:center;">
                <h3>📤 TÉLÉVERSER UN FICHIER</h3>
                <input type="file" id="up-file" style="margin:20px 0; color:#fff;">
                <button onclick="alert('Upload au serveur Nexus local lancé !')" style="padding:15px 30px; background:var(--main); font-weight:bold; border-radius:5px;">PUBLIER SUR L'EMPIRE</button>
            </div>
        </div>
    </div>

    <div id="win-market" class="window">
        <div class="win-head"><span>NEXUS MARKETPLACE</span><i class="fas fa-times close-btn" onclick="closeWin('market')"></i></div>
        <div class="win-body"><h3>Boutique en ligne chargée.</h3><p>Contactez @CrogendSoumahoro_Bot pour vos achats.</p></div>
    </div>

    <script>
        function openWin(id) { 
            if(id === 'admin') {
                let p = prompt("Badge Admin :");
                if(p !== "soum225") return;
            }
            document.getElementById('win-' + id).style.display = 'flex'; 
        }
        function closeWin(id) { document.getElementById('win-' + id).style.display = 'none'; }
    </script>
</body>
</html>
